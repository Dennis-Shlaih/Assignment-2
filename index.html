<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Expense Tracker</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <h1>Expense Tracker</h1>
        </header>
        <main>
            <div class="top-sections">
                <section>
                    <h2>Add Expense</h2>
                    <form id="expense-form">
                        <label for="description">
                            Description
                        </label>
                        <input
                            type="text"
                            id="description"
                            name="description">
                        
                        <label for="amount">
                            Amount
                        </label>
                        <input
                            type="number"
                            id="amount"
                            name="amount"
                            min="0"
                            step="0.01">
                        
                        <label for="catagory">
                            Category
                        </label>
                        <select
                            id="category"
                            name="category">
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Other">Other</option>
                        </select>
                        
                        <label for="date">
                            Date
                        </label>
                        <input
                        type="date"
                        id="date"
                        name="date">

                        <button type="submit">Add Expense</button>
                    </form>
                    <p id="error-message"></p>
                </section>
            
                <section>
                    <h2>Controls</h2>
                    <label for="filter-category">Filter by Category</label>
                    <select id="filter-category">
                        <option value="All">All</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                    <label for="sort-expenses">
                        Sort Expenses
                    </label>
                    <select id="sort-expenses">
                        <option value="date-descending">
                            Date (Newest First)
                        </option>
                        <option value="date-ascending">
                            Date (Oldest First)
                        </option>
                        <option value="amount-descending">
                            Amount (Highest First)
                        </option>
                        <option value="amount-ascending">
                            Amount (Lowest First)
                        </option>
                    </select>
                </section>
            </div>
            
            <section>
                <h2>Totals</h2>
                <p>
                    Overall Total:
                    <span id="overall-total">$0.00</span>
                </p>
                <button id="convert-button">
                    Convert to EUR
                </button>
                <p id="converted-total"></p>
                <div id="category-totals"></div>
                <p>
                    Expense Count:
                    <span id="expense-count">0</span>
                </p>
            </section>

            <section>
                <h2>Expenses</h2>
                <div id="empty-state">
                    No expenses yet.
                </div>
                <div id="expense-list"></div>
            </section>
        </main>
        <script src="script.js"></script>
    </body>
</html>
